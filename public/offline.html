<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline | WPAgency.space</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --accent: #8b5cf6;
      --text: #f9fafb;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --background: #0f172a;
      --background-darker: #020617;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--background-darker), var(--background));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    
    .container {
      max-width: 600px;
      animation: fadeIn 0.8s ease-out;
    }
    
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, white, #e2e8f0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    p {
      font-size: 1.25rem;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.5);
    }
    
    .button svg {
      margin-right: 0.5rem;
      width: 20px;
      height: 20px;
    }
    
    .cached-content {
      margin-top: 3rem;
      width: 100%;
    }
    
    .cached-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    
    .cached-links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .cached-link {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      border-radius: 0.5rem;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    
    .cached-link:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .pulse {
      animation: pulse 2s infinite ease-in-out;
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">WPAgency<span style="color: #60a5fa;">.space</span></div>
    
    <div class="icon pulse">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be limited until you're back online.</p>
    
    <button class="button" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Try Again
    </button>
    
    <div class="cached-content">
      <h2>Available Offline</h2>
      <p>You can still access these previously visited pages:</p>
      <div id="cached-links" class="cached-links">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>
  
  <script>
    // Populate cached pages when offline
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const cache = await caches.open('wpagency-cache-v1');
        const requests = await cache.keys();
        const cachedLinks = document.getElementById('cached-links');
        
        // Filter for HTML pages (excluding offline.html)
        const htmlRequests = requests.filter(request => {
          return request.url.endsWith('.html') || 
                 request.url.endsWith('/') || 
                 !request.url.includes('.') && 
                 !request.url.includes('offline');
        });
        
        if (htmlRequests.length === 0) {
          cachedLinks.innerHTML = '<p>No pages available offline yet. Visit some pages while online to cache them for offline use.</p>';
          return;
        }
        
        // Create links for cached pages
        htmlRequests.forEach(request => {
          const url = new URL(request.url);
          const path = url.pathname;
          const displayPath = path === '/' ? 'Home' : path.replace(/\//g, ' › ').trim();
          
          const link = document.createElement('a');
          link.href = path;
          link.className = 'cached-link';
          link.textContent = displayPath;
          cachedLinks.appendChild(link);
        });
      } catch (error) {
        console.error('Error loading cached pages:', error);
      }
    });
  </script>
</body>
</html>
