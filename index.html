<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Source Seeker - Elite Digital Agency | Transform Your Business Online</title>
  <meta name="description"
    content="Transform your business with exceptional web design, development, and digital solutions. We deliver measurable results through strategic design, smart technology, and data-driven growth strategies." />
  <meta name="author" content="Source Seeker" />
  <meta name="keywords"
    content="elite web design, digital transformation, web development, digital marketing, UI/UX design, business growth, online presence, digital agency, custom websites, e-commerce solutions" />

  <!-- Performance optimizations -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="MobileOptimized" content="width" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- PWA Related Meta Tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Source Seeker" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <!-- Enhanced Open Graph -->
  <meta property="og:title" content="Source Seeker - Elite Digital Agency" />
  <meta property="og:description"
    content="Transform your business with exceptional web design, development, and digital solutions." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:url" content="https://example.com" />
  <meta property="og:site_name" content="Source Seeker" />
  <meta property="og:locale" content="en_US" />

  <!-- Enhanced Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@yourhandle" />
  <meta name="twitter:title" content="Source Seeker - Elite Digital Agency" />
  <meta name="twitter:description"
    content="Transform your business with exceptional web design, development, and digital solutions." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Preconnect to critical third parties -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <div id="root"></div>

  <!-- Structured Data for SEO -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Source Seeker",
      "description": "Elite digital agency specializing in web design, development, and digital transformation solutions",
      "url": "https://example.com",
      "email": "hello@example.com",
      "foundingDate": "2024",
      "areaServed": "Worldwide",
      "serviceType": ["Web Design", "Web Development", "Digital Marketing", "UI/UX Design"],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@example.com",
        "contactType": "customer service",
        "availableLanguage": "English"
      }
    }
    </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
